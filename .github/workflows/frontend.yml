name: Frontend React CI

permissions:
  contents: read
  statuses: write

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm -g i eslint-cli
          npm install eslint --save-dev
          npm run lint

      - name: Run TypeScript check
        run: |
          cd frontend
          npm -g i typescript
          npm install typescript --save-dev
          npm run typecheck

      - name: Run Accessibility check
        run: |
          cd frontend
          npm run a11y:ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd frontend
          npm run test:e2e
